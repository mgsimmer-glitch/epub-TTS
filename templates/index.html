<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>epub → audiobook</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d0d14;
      --surface:     #13131c;
      --surface2:    #1c1c28;
      --surface3:    #24243a;
      --border:      #2e2e44;
      --accent:      #818cf8;
      --accent-dim:  #4f46e5;
      --success:     #34d399;
      --error:       #f87171;
      --warning:     #fbbf24;
      --text:        #e2e8f0;
      --text-muted:  #6b7a99;
      --radius:      10px;
      --shadow:      0 4px 24px rgba(0,0,0,.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 32px 16px 64px;
    }

    .container { max-width: 760px; margin: 0 auto; }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 36px; }
    header h1 { font-size: 28px; font-weight: 700; letter-spacing: -.5px; }
    header h1 span { color: var(--accent); }
    header p { color: var(--text-muted); margin-top: 4px; font-size: 13px; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* ── Drop zone ── */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 36px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(129,140,248,.05);
    }
    #drop-zone .icon { font-size: 32px; margin-bottom: 10px; }
    #drop-zone .primary { font-size: 15px; font-weight: 500; }
    #drop-zone .secondary { color: var(--text-muted); font-size: 13px; margin-top: 4px; }
    #drop-zone .browse { color: var(--accent); cursor: pointer; text-decoration: underline; }

    /* ── File list ── */
    #file-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
    .file-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
    }
    .file-row .file-icon { font-size: 16px; flex-shrink: 0; }
    .file-row .file-name { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-row .file-size { color: var(--text-muted); font-size: 12px; flex-shrink: 0; }
    .file-row .remove-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 18px; line-height: 1; padding: 0 2px;
      flex-shrink: 0;
    }
    .file-row .remove-btn:hover { color: var(--error); }

    /* ── Voice selector ── */
    .voice-controls { display: flex; flex-direction: column; gap: 8px; }
    .voice-filter-row { display: flex; gap: 8px; }
    input[type="text"], select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }
    input[type="text"]:focus, select:focus { border-color: var(--accent); }
    select { cursor: pointer; }
    select option { background: var(--surface2); }

    /* ── Convert button ── */
    #convert-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent-dim);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, background .15s;
      margin-top: 4px;
    }
    #convert-btn:hover:not(:disabled) { background: var(--accent); }
    #convert-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Progress section ── */
    #progress-section { display: none; }

    .overall-bar-wrap { margin-bottom: 20px; }
    .overall-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .track {
      height: 6px;
      background: var(--surface3);
      border-radius: 99px;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width .4s ease;
      width: 0%;
    }

    /* ── Per-file items ── */
    #progress-items { display: flex; flex-direction: column; gap: 10px; }

    .pitem {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .pitem-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0;
    }
    .pitem-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pitem-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
      flex-shrink: 0;
    }
    .badge-queued   { background: var(--surface3); color: var(--text-muted); }
    .badge-running  { background: rgba(129,140,248,.2); color: var(--accent); }
    .badge-merging  { background: rgba(251,191,36,.15); color: var(--warning); }
    .badge-done     { background: rgba(52,211,153,.15); color: var(--success); }
    .badge-error    { background: rgba(248,113,113,.15); color: var(--error); }

    .pitem-progress { margin-top: 10px; }
    .pitem-progress .track { height: 4px; }
    .pitem-progress-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 5px;
    }

    .pitem-footer {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .saved-path {
      flex: 1;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pitem-error-msg {
      font-size: 12px;
      color: var(--error);
      flex: 1;
    }
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      background: rgba(52,211,153,.15);
      color: var(--success);
      border: 1px solid rgba(52,211,153,.3);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background .15s;
      flex-shrink: 0;
    }
    .download-btn:hover { background: rgba(52,211,153,.25); }

    /* ── New batch button ── */
    #new-batch-btn {
      width: 100%;
      padding: 11px;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: background .15s;
      display: none;
    }
    #new-batch-btn:hover { background: rgba(129,140,248,.08); }

    /* ── Global error banner ── */
    #error-banner {
      display: none;
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.3);
      border-radius: 8px;
      color: var(--error);
      font-size: 13px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>epub <span>→</span> audiobook</h1>
    <p>Batch convert EPUB files to MP3 using Microsoft Edge TTS</p>
  </header>

  <div id="error-banner"></div>

  <!-- ── Setup card ── -->
  <div class="card" id="setup-card">
    <div class="card-title">Files</div>

    <div id="drop-zone">
      <div class="icon">📚</div>
      <div class="primary">Drop EPUB files here</div>
      <div class="secondary">or <span class="browse" id="browse-link">browse files</span></div>
      <input type="file" id="file-input" multiple accept=".epub" style="display:none">
    </div>

    <div id="file-list"></div>
  </div>

  <div class="card">
    <div class="card-title">Voice</div>
    <div class="voice-controls">
      <input type="text" id="voice-filter" placeholder="Filter by name or locale…" autocomplete="off">
      <select id="voice-select" size="1">
        <option disabled selected>Loading voices…</option>
      </select>
    </div>
  </div>

  <button id="convert-btn" disabled>Convert</button>

  <!-- ── Progress card ── -->
  <div class="card" id="progress-section" style="display:none; margin-top:24px;">
    <div class="card-title">Progress</div>

    <div class="overall-bar-wrap">
      <div class="overall-label">
        <span id="overall-text">Starting…</span>
        <span id="overall-count"></span>
      </div>
      <div class="track"><div class="fill" id="overall-fill"></div></div>
    </div>

    <div id="progress-items"></div>

    <button id="new-batch-btn">+ Convert another batch</button>
  </div>

</div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let selectedFiles = [];
let allVoices = [];
let eventSource = null;

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
document.addEventListener("DOMContentLoaded", () => {
  loadVoices();
  setupDragDrop();

  document.getElementById("browse-link").addEventListener("click", () =>
    document.getElementById("file-input").click()
  );
  document.getElementById("file-input").addEventListener("change", e =>
    addFiles(Array.from(e.target.files))
  );
  document.getElementById("voice-filter").addEventListener("input", filterVoices);
  document.getElementById("convert-btn").addEventListener("click", startConversion);
  document.getElementById("new-batch-btn").addEventListener("click", resetUI);
});

// ---------------------------------------------------------------------------
// Voice loading
// ---------------------------------------------------------------------------
async function loadVoices() {
  try {
    const res = await fetch("/voices");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allVoices = await res.json();
    renderVoices(allVoices);
  } catch (e) {
    showBanner(`Failed to load voices: ${e.message}`);
  }
}

function renderVoices(voices) {
  const sel = document.getElementById("voice-select");
  const prev = sel.value;
  sel.innerHTML = "";
  for (const v of voices) {
    const opt = document.createElement("option");
    opt.value = v.name;
    opt.textContent = `${v.name}  (${v.locale} · ${v.gender})`;
    if (v.name === "en-US-AriaNeural") opt.selected = true;
    sel.appendChild(opt);
  }
  if (prev && sel.querySelector(`option[value="${prev}"]`)) sel.value = prev;
}

function filterVoices() {
  const q = document.getElementById("voice-filter").value.toLowerCase();
  renderVoices(q ? allVoices.filter(v =>
    v.name.toLowerCase().includes(q) || v.locale.toLowerCase().includes(q)
  ) : allVoices);
}

// ---------------------------------------------------------------------------
// Drag & drop
// ---------------------------------------------------------------------------
function setupDragDrop() {
  const zone = document.getElementById("drop-zone");
  zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("drag-over"); });
  zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
  zone.addEventListener("drop", e => {
    e.preventDefault();
    zone.classList.remove("drag-over");
    addFiles(Array.from(e.dataTransfer.files));
  });
  zone.addEventListener("click", e => {
    if (e.target.id !== "browse-link") document.getElementById("file-input").click();
  });
}

// ---------------------------------------------------------------------------
// File management
// ---------------------------------------------------------------------------
function addFiles(files) {
  for (const f of files) {
    if (!f.name.toLowerCase().endsWith(".epub")) continue;
    if (selectedFiles.find(s => s.name === f.name && s.size === f.size)) continue;
    selectedFiles.push(f);
  }
  renderFileList();
  syncConvertBtn();
}

function removeFile(idx) {
  selectedFiles.splice(idx, 1);
  renderFileList();
  syncConvertBtn();
}

function renderFileList() {
  const list = document.getElementById("file-list");
  list.innerHTML = "";
  for (let i = 0; i < selectedFiles.length; i++) {
    const f = selectedFiles[i];
    const row = document.createElement("div");
    row.className = "file-row";
    row.innerHTML = `
      <span class="file-icon">📄</span>
      <span class="file-name" title="${esc(f.name)}">${esc(f.name)}</span>
      <span class="file-size">${formatBytes(f.size)}</span>
      <button class="remove-btn" title="Remove" data-idx="${i}">×</button>
    `;
    row.querySelector(".remove-btn").addEventListener("click", () => removeFile(i));
    list.appendChild(row);
  }
}

function syncConvertBtn() {
  document.getElementById("convert-btn").disabled = selectedFiles.length === 0;
}

// ---------------------------------------------------------------------------
// Conversion
// ---------------------------------------------------------------------------
async function startConversion() {
  if (selectedFiles.length === 0) return;
  hideBanner();

  const voice = document.getElementById("voice-select").value;
  if (!voice) { showBanner("Please select a voice."); return; }

  const btn = document.getElementById("convert-btn");
  btn.disabled = true;
  btn.textContent = "Uploading…";

  const form = new FormData();
  for (const f of selectedFiles) form.append("files", f);
  form.append("voice", voice);

  let jobId;
  try {
    const res = await fetch("/jobs", { method: "POST", body: form });
    if (!res.ok) {
      const detail = await res.json().catch(() => ({}));
      throw new Error(detail.detail || `HTTP ${res.status}`);
    }
    ({ job_id: jobId } = await res.json());
  } catch (e) {
    showBanner(`Failed to start conversion: ${e.message}`);
    btn.disabled = false;
    btn.textContent = "Convert";
    return;
  }

  btn.textContent = "Converting…";
  showProgressSection();
  connectSSE(jobId);
}

// ---------------------------------------------------------------------------
// Progress section
// ---------------------------------------------------------------------------
function showProgressSection() {
  document.getElementById("progress-section").style.display = "";
  document.getElementById("progress-items").innerHTML = "";

  for (const f of selectedFiles) {
    const el = document.createElement("div");
    el.className = "pitem";
    el.id = `pitem-${slugify(f.name)}`;
    el.dataset.filename = f.name;
    el.dataset.totalChapters = "0";
    el.dataset.doneChapters = "0";
    el.innerHTML = `
      <div class="pitem-header">
        <span class="pitem-name" title="${esc(f.name)}">${esc(f.name)}</span>
        <span class="pitem-badge badge-queued">Queued</span>
      </div>
    `;
    document.getElementById("progress-items").appendChild(el);
  }

  setOverallProgress(0, selectedFiles.length);
}

function getItem(filename) {
  return document.querySelector(`[data-filename="${CSS.escape(filename)}"]`);
}

function setBadge(el, cls, text) {
  const b = el.querySelector(".pitem-badge");
  b.className = `pitem-badge ${cls}`;
  b.textContent = text;
}

function ensureProgressBar(el) {
  if (!el.querySelector(".pitem-progress")) {
    const bar = document.createElement("div");
    bar.className = "pitem-progress";
    bar.innerHTML = `
      <div class="track"><div class="fill chapter-fill"></div></div>
      <div class="pitem-progress-label"></div>
    `;
    el.appendChild(bar);
  }
}

function setChapterProgress(el, idx, total, title) {
  ensureProgressBar(el);
  const pct = total > 0 ? Math.round((idx / total) * 100) : 0;
  el.querySelector(".chapter-fill").style.width = pct + "%";
  el.querySelector(".pitem-progress-label").textContent =
    title ? `Chapter ${idx}/${total} — ${title}` : `Chapter ${idx}/${total}`;
}

function setOverallProgress(done, total) {
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById("overall-fill").style.width = pct + "%";
  document.getElementById("overall-count").textContent = `${done} / ${total}`;
}

// ---------------------------------------------------------------------------
// SSE
// ---------------------------------------------------------------------------
function connectSSE(jobId) {
  if (eventSource) eventSource.close();
  eventSource = new EventSource(`/jobs/${jobId}/stream`);
  eventSource.onmessage = e => handleEvent(JSON.parse(e.data), jobId);
  eventSource.onerror = () => {
    showBanner("Connection lost. Conversion may still be running in the background.");
    eventSource.close();
  };
}

let _doneCount = 0;
let _totalCount = 0;

function handleEvent(ev, jobId) {
  switch (ev.type) {

    case "file_start": {
      _totalCount = ev.total_files;
      _doneCount = 0;
      const el = getItem(ev.file);
      if (el) setBadge(el, "badge-running", "Starting…");
      document.getElementById("overall-text").textContent =
        `Converting ${ev.file_index + 1} of ${ev.total_files}`;
      break;
    }

    case "start": {
      const el = getItem(ev.file);
      if (!el) break;
      setBadge(el, "badge-running", "Converting");
      el.dataset.totalChapters = ev.total_chapters;
      setChapterProgress(el, 0, ev.total_chapters, null);
      break;
    }

    case "chapter_start": {
      const el = getItem(ev.file);
      if (!el) break;
      setBadge(el, "badge-running", "Converting");
      setChapterProgress(el, ev.index - 1, ev.total, ev.title);
      break;
    }

    case "chapter_done": {
      const el = getItem(ev.file);
      if (!el) break;
      setChapterProgress(el, ev.index, ev.total, null);
      break;
    }

    case "merging": {
      const el = getItem(ev.file);
      if (!el) break;
      setBadge(el, "badge-merging", "Merging…");
      const lbl = el.querySelector(".pitem-progress-label");
      if (lbl) lbl.textContent = "Merging chapters…";
      break;
    }

    case "file_done": {
      _doneCount = ev.file_index + 1;
      const el = getItem(ev.file);
      if (el) {
        setBadge(el, "badge-done", "Done");
        const bar = el.querySelector(".pitem-progress");
        if (bar) {
          bar.querySelector(".chapter-fill").style.width = "100%";
          bar.querySelector(".pitem-progress-label").textContent = "Complete";
        }
        let footer = el.querySelector(".pitem-footer");
        if (!footer) {
          footer = document.createElement("div");
          footer.className = "pitem-footer";
          el.appendChild(footer);
        }
        const savedName = ev.saved_to ? ev.saved_to.split("/").pop() : "";
        footer.innerHTML = `
          <span class="saved-path" title="${esc(ev.saved_to || "")}">
            📂 Saved to ~/Downloads/${esc(savedName)}
          </span>
          <a class="download-btn" href="${ev.download_url}" download>⬇ Download</a>
        `;
      }
      setOverallProgress(_doneCount, ev.total_files);
      break;
    }

    case "file_error": {
      _doneCount = ev.file_index + 1;
      const el = getItem(ev.file);
      if (el) {
        setBadge(el, "badge-error", "Error");
        let footer = el.querySelector(".pitem-footer");
        if (!footer) {
          footer = document.createElement("div");
          footer.className = "pitem-footer";
          el.appendChild(footer);
        }
        footer.innerHTML = `<span class="pitem-error-msg">⚠ ${esc(ev.error)}</span>`;
      }
      setOverallProgress(_doneCount, ev.total_files);
      break;
    }

    case "batch_done": {
      document.getElementById("overall-text").textContent = "Done";
      setOverallProgress(ev.total_files, ev.total_files);
      document.getElementById("new-batch-btn").style.display = "";
      document.getElementById("convert-btn").textContent = "Convert";
      if (eventSource) eventSource.close();
      break;
    }

    case "heartbeat":
      break;
  }
}

// ---------------------------------------------------------------------------
// Reset
// ---------------------------------------------------------------------------
function resetUI() {
  selectedFiles = [];
  renderFileList();
  syncConvertBtn();
  document.getElementById("progress-section").style.display = "none";
  document.getElementById("new-batch-btn").style.display = "none";
  document.getElementById("convert-btn").textContent = "Convert";
  hideBanner();
  if (eventSource) { eventSource.close(); eventSource = null; }
}

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
function showBanner(msg) {
  const b = document.getElementById("error-banner");
  b.textContent = msg;
  b.style.display = "";
}
function hideBanner() {
  document.getElementById("error-banner").style.display = "none";
}

function formatBytes(n) {
  if (n < 1024) return n + " B";
  if (n < 1048576) return (n / 1024).toFixed(1) + " KB";
  return (n / 1048576).toFixed(1) + " MB";
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function slugify(s) {
  return s.replace(/[^a-zA-Z0-9]/g, "_");
}
</script>
</body>
</html>
